spring:
  datasource:
    url: jdbc:mysql://localhost:3306/convenience_store?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: true

server:
  port: 8080

jwt:
  expiration: 86400000